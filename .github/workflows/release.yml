name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install coverage
        run: python -m pip install --quiet coverage
      - name: Run tests with coverage
        run: |
          python -m coverage run --source=scrivcheck -m unittest discover -s tests -v
          python -m coverage report -m --fail-under=100

  release:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify binary is present
        run: test -f ScrivCheck.app/Contents/MacOS/ScrivCheck

      - name: Zip app bundle
        run: ditto -c -k --keepParent ScrivCheck.app ScrivCheck.zip

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "ScrivCheck $TAG" \
            --notes "## ScrivCheck $TAG

          ### Install

          1. Download \`ScrivCheck.zip\` below and unzip it.
          2. Move \`ScrivCheck.app\` to \`~/Applications/\`.
          3. Right-click → Open the first time (Gatekeeper prompt for unsigned apps).
          4. Clone or update the Python script:
             \`\`\`bash
             git clone https://github.com/fyodoriv/ScrivCheck.git ~/apps/scrivCheck
             \`\`\`
          5. Edit \`DEFAULT_SCREENSHOT_BOOKS\` near the top of \`scrivcheck.py\`
             to use your own book names.

          ### Install the CLI

          \`\`\`bash
          chmod +x ~/apps/scrivCheck/scrivcheck.py
          mkdir -p ~/.local/bin
          ln -sf ~/apps/scrivCheck/scrivcheck.py ~/.local/bin/scrivcheck
          \`\`\`

          See the [README](https://github.com/fyodoriv/ScrivCheck#readme) for full usage." \
            ScrivCheck.zip
